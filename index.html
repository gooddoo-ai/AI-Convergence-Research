<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI×Materials Daily — 오늘의 융합연구</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Space+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --card-hover: #1f1f30;
    --border: rgba(255,255,255,0.07);
    --accent1: #7b6bff;
    --accent2: #00e5c8;
    --accent3: #ff6b9d;
    --accent4: #ffb347;
    --text-primary: #f0f0f8;
    --text-secondary: #9090b0;
    --text-muted: #5a5a7a;
    --journal-science: #ff6b6b;
    --journal-nature: #4ecdc4;
    --journal-ncomm: #45b7d1;
    --journal-sadv: #96ceb4;
    --journal-amat: #feca57;
    --journal-afm: #ff9ff3;
    --journal-srobo: #54a0ff;
    --journal-nelec: #5f27cd;
    --journal-nmi: #00d2d3;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text-primary);
font-family: ‘Noto Sans KR’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

/* Background grain */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background-image: url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘noise’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23noise)’ opacity=‘0.03’/%3E%3C/svg%3E”);
pointer-events: none;
z-index: 0;
opacity: 0.4;
}

/* Header */
header {
position: sticky;
top: 0;
z-index: 100;
background: rgba(10,10,15,0.85);
backdrop-filter: blur(20px);
border-bottom: 1px solid var(–border);
padding: 0 2rem;
}

.header-inner {
max-width: 1400px;
margin: 0 auto;
display: flex;
align-items: center;
justify-content: space-between;
height: 64px;
gap: 1rem;
}

.logo {
display: flex;
align-items: center;
gap: 0.75rem;
}

.logo-icon {
width: 36px;
height: 36px;
background: linear-gradient(135deg, var(–accent1), var(–accent2));
border-radius: 10px;
display: flex;
align-items: center;
justify-content: center;
font-size: 18px;
}

.logo-text {
font-family: ‘Space Mono’, monospace;
font-size: 1.1rem;
font-weight: 700;
color: var(–text-primary);
letter-spacing: -0.02em;
}

.logo-sub {
font-size: 0.65rem;
color: var(–text-muted);
letter-spacing: 0.15em;
text-transform: uppercase;
margin-top: 2px;
}

.header-date {
font-family: ‘Space Mono’, monospace;
font-size: 0.75rem;
color: var(–text-muted);
}

.refresh-btn {
background: linear-gradient(135deg, var(–accent1), var(–accent2));
border: none;
border-radius: 8px;
color: white;
padding: 0.45rem 1rem;
font-family: ‘Noto Sans KR’, sans-serif;
font-size: 0.8rem;
cursor: pointer;
transition: opacity 0.2s, transform 0.2s;
white-space: nowrap;
}

.refresh-btn:hover { opacity: 0.85; transform: translateY(-1px); }

/* Main layout */
main {
max-width: 1400px;
margin: 0 auto;
padding: 2rem 2rem 4rem;
position: relative;
z-index: 1;
}

/* AI Summary Section */
.ai-summary {
background: linear-gradient(135deg, rgba(123,107,255,0.12) 0%, rgba(0,229,200,0.08) 100%);
border: 1px solid rgba(123,107,255,0.3);
border-radius: 20px;
padding: 2rem 2.5rem;
margin-bottom: 2.5rem;
position: relative;
overflow: hidden;
}

.ai-summary::before {
content: ‘’;
position: absolute;
top: -40px; right: -40px;
width: 200px; height: 200px;
background: radial-gradient(circle, rgba(123,107,255,0.15), transparent 70%);
border-radius: 50%;
}

.ai-badge {
display: inline-flex;
align-items: center;
gap: 0.4rem;
background: rgba(123,107,255,0.2);
border: 1px solid rgba(123,107,255,0.4);
border-radius: 20px;
padding: 0.3rem 0.8rem;
font-size: 0.72rem;
font-family: ‘Space Mono’, monospace;
color: var(–accent1);
margin-bottom: 1rem;
letter-spacing: 0.05em;
}

.ai-badge::before {
content: ‘●’;
animation: pulse 2s infinite;
color: var(–accent2);
}

@keyframes pulse {
0%,100% { opacity:1; }
50% { opacity:0.3; }
}

.ai-summary-title {
font-family: ‘Playfair Display’, serif;
font-size: 1.3rem;
color: var(–text-primary);
margin-bottom: 0.8rem;
}

.ai-summary-text {
font-size: 0.92rem;
line-height: 1.85;
color: var(–text-secondary);
max-width: 900px;
}

.ai-summary-text .loading {
display: flex;
align-items: center;
gap: 0.5rem;
color: var(–text-muted);
}

.spinner {
width: 16px; height: 16px;
border: 2px solid var(–border);
border-top-color: var(–accent1);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Journal filter bar */
.filter-bar {
display: flex;
gap: 0.5rem;
flex-wrap: wrap;
margin-bottom: 2rem;
align-items: center;
}

.filter-label {
font-size: 0.72rem;
color: var(–text-muted);
font-family: ‘Space Mono’, monospace;
letter-spacing: 0.1em;
text-transform: uppercase;
margin-right: 0.5rem;
}

.filter-btn {
border: 1px solid var(–border);
background: var(–surface);
color: var(–text-secondary);
border-radius: 20px;
padding: 0.35rem 0.85rem;
font-size: 0.75rem;
font-family: ‘Noto Sans KR’, sans-serif;
cursor: pointer;
transition: all 0.2s;
white-space: nowrap;
}

.filter-btn:hover, .filter-btn.active {
background: var(–card-hover);
color: var(–text-primary);
border-color: rgba(255,255,255,0.2);
}

/* Instagram-style grid */
.feed-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
gap: 1.5rem;
}

/* Paper card */
.paper-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 18px;
overflow: hidden;
transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
cursor: pointer;
position: relative;
}

.paper-card:hover {
transform: translateY(-4px);
box-shadow: 0 20px 60px rgba(0,0,0,0.4);
border-color: rgba(255,255,255,0.15);
}

/* Figure area */
.card-figure {
width: 100%;
aspect-ratio: 16/10;
position: relative;
overflow: hidden;
background: var(–surface);
}

.card-figure svg {
width: 100%;
height: 100%;
}

.figure-overlay {
position: absolute;
inset: 0;
background: linear-gradient(to bottom, transparent 50%, rgba(10,10,15,0.8) 100%);
}

/* Journal tag on image */
.journal-tag {
position: absolute;
top: 12px;
left: 12px;
padding: 0.3rem 0.7rem;
border-radius: 8px;
font-family: ‘Space Mono’, monospace;
font-size: 0.68rem;
font-weight: 700;
letter-spacing: 0.05em;
z-index: 2;
}

.year-tag {
position: absolute;
top: 12px;
right: 12px;
padding: 0.3rem 0.6rem;
border-radius: 8px;
background: rgba(0,0,0,0.5);
border: 1px solid rgba(255,255,255,0.15);
font-family: ‘Space Mono’, monospace;
font-size: 0.65rem;
color: var(–text-secondary);
z-index: 2;
}

/* Card content */
.card-content {
padding: 1.25rem 1.5rem 1.5rem;
}

.card-authors {
font-size: 0.7rem;
color: var(–text-muted);
font-family: ‘Space Mono’, monospace;
margin-bottom: 0.6rem;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.card-title {
font-family: ‘Playfair Display’, serif;
font-size: 1.02rem;
line-height: 1.4;
color: var(–text-primary);
margin-bottom: 0.9rem;
display: -webkit-box;
-webkit-line-clamp: 3;
-webkit-box-orient: vertical;
overflow: hidden;
}

.card-summary {
font-size: 0.82rem;
line-height: 1.7;
color: var(–text-secondary);
margin-bottom: 1.1rem;
display: -webkit-box;
-webkit-line-clamp: 5;
-webkit-box-orient: vertical;
overflow: hidden;
}

/* Tags */
.card-tags {
display: flex;
flex-wrap: wrap;
gap: 0.4rem;
margin-bottom: 1.1rem;
}

.tag {
background: rgba(255,255,255,0.05);
border: 1px solid var(–border);
border-radius: 5px;
padding: 0.2rem 0.55rem;
font-size: 0.68rem;
color: var(–text-muted);
font-family: ‘Space Mono’, monospace;
}

/* Card footer */
.card-footer {
display: flex;
align-items: center;
justify-content: space-between;
padding-top: 1rem;
border-top: 1px solid var(–border);
}

.card-doi {
font-size: 0.68rem;
color: var(–text-muted);
font-family: ‘Space Mono’, monospace;
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
max-width: 200px;
}

.card-link {
display: inline-flex;
align-items: center;
gap: 0.4rem;
padding: 0.4rem 1rem;
border-radius: 8px;
font-size: 0.75rem;
font-weight: 500;
color: white;
text-decoration: none;
transition: opacity 0.2s, transform 0.15s;
white-space: nowrap;
flex-shrink: 0;
}

.card-link:hover { opacity: 0.85; transform: translateY(-1px); }

.card-link svg {
width: 13px; height: 13px;
}

/* Expand button */
.expand-btn {
position: absolute;
bottom: 0; left: 0; right: 0;
background: none;
border: none;
color: var(–text-muted);
font-size: 0.75rem;
cursor: pointer;
padding: 0.4rem;
text-align: center;
transition: color 0.2s;
display: none;
}

/* Section header */
.section-header {
display: flex;
align-items: baseline;
gap: 1rem;
margin-bottom: 1.5rem;
}

.section-title {
font-family: ‘Space Mono’, monospace;
font-size: 0.75rem;
letter-spacing: 0.15em;
text-transform: uppercase;
color: var(–text-muted);
}

.section-count {
font-family: ‘Space Mono’, monospace;
font-size: 0.7rem;
color: var(–text-muted);
}

/* Modal */
.modal-overlay {
position: fixed;
inset: 0;
background: rgba(0,0,0,0.75);
backdrop-filter: blur(8px);
z-index: 200;
display: flex;
align-items: center;
justify-content: center;
padding: 1rem;
opacity: 0;
pointer-events: none;
transition: opacity 0.3s;
}

.modal-overlay.open {
opacity: 1;
pointer-events: all;
}

.modal {
background: var(–card);
border: 1px solid rgba(255,255,255,0.12);
border-radius: 24px;
max-width: 700px;
width: 100%;
max-height: 90vh;
overflow-y: auto;
transform: translateY(20px);
transition: transform 0.3s;
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-figure {
width: 100%;
aspect-ratio: 16/9;
background: var(–surface);
border-radius: 24px 24px 0 0;
overflow: hidden;
}

.modal-figure svg { width: 100%; height: 100%; }

.modal-body { padding: 2rem; }

.modal-journal { margin-bottom: 0.6rem; }

.modal-title {
font-family: ‘Playfair Display’, serif;
font-size: 1.4rem;
line-height: 1.35;
color: var(–text-primary);
margin-bottom: 0.8rem;
}

.modal-authors {
font-size: 0.78rem;
color: var(–text-muted);
font-family: ‘Space Mono’, monospace;
margin-bottom: 1.2rem;
}

.modal-summary {
font-size: 0.9rem;
line-height: 1.8;
color: var(–text-secondary);
margin-bottom: 1.5rem;
}

.modal-tags { margin-bottom: 1.5rem; }

.modal-footer {
display: flex;
gap: 1rem;
align-items: center;
flex-wrap: wrap;
}

.modal-close {
margin-left: auto;
background: var(–surface);
border: 1px solid var(–border);
color: var(–text-secondary);
border-radius: 8px;
padding: 0.45rem 1rem;
font-size: 0.8rem;
cursor: pointer;
transition: all 0.2s;
}

.modal-close:hover { background: var(–card-hover); color: var(–text-primary); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(–bg); }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }

/* Responsive */
@media (max-width: 768px) {
.feed-grid { grid-template-columns: 1fr; }
header { padding: 0 1rem; }
main { padding: 1.5rem 1rem 3rem; }
.ai-summary { padding: 1.5rem; }
.header-date { display: none; }
}

@media (max-width: 480px) {
.feed-grid { grid-template-columns: 1fr; }
}

/* Animation */
.paper-card {
opacity: 0;
transform: translateY(16px);
animation: fadeUp 0.5s forwards;
}

@keyframes fadeUp {
to { opacity: 1; transform: translateY(0); }
}

.paper-card:nth-child(1) { animation-delay: 0.05s; }
.paper-card:nth-child(2) { animation-delay: 0.1s; }
.paper-card:nth-child(3) { animation-delay: 0.15s; }
.paper-card:nth-child(4) { animation-delay: 0.2s; }
.paper-card:nth-child(5) { animation-delay: 0.25s; }
.paper-card:nth-child(6) { animation-delay: 0.3s; }
.paper-card:nth-child(7) { animation-delay: 0.35s; }
.paper-card:nth-child(8) { animation-delay: 0.4s; }
.paper-card:nth-child(9) { animation-delay: 0.45s; }

/* Figure placeholder art */
.fig-art {
width: 100%;
height: 100%;
}
</style>

</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">⚛</div>
      <div>
        <div class="logo-text">AI×Materials Daily</div>
        <div class="logo-sub">융합연구 큐레이션</div>
      </div>
    </div>
    <div class="header-date" id="headerDate"></div>
    <button class="refresh-btn" onclick="refreshAll()">🔄 오늘의 논문 갱신</button>
  </div>
</header>

<main>
  <!-- AI Summary -->
  <div class="ai-summary">
    <div class="ai-badge">AI ASSISTANT — 오늘의 연구 브리핑</div>
    <div class="ai-summary-title">오늘의 융합연구 요약</div>
    <div class="ai-summary-text" id="aiSummaryText">
      <div class="loading"><div class="spinner"></div> AI 요약을 생성 중입니다...</div>
    </div>
  </div>

  <!-- Filter Bar -->

  <div class="filter-bar">
    <span class="filter-label">저널 필터</span>
    <button class="filter-btn active" data-filter="all" onclick="filterCards(this, 'all')">전체</button>
    <button class="filter-btn" data-filter="Science" onclick="filterCards(this, 'Science')">Science</button>
    <button class="filter-btn" data-filter="Nature" onclick="filterCards(this, 'Nature')">Nature</button>
    <button class="filter-btn" data-filter="Nature Comm" onclick="filterCards(this, 'Nature Comm')">Nature Comm</button>
    <button class="filter-btn" data-filter="Science Advances" onclick="filterCards(this, 'Science Advances')">Sci. Advances</button>
    <button class="filter-btn" data-filter="Advanced Materials" onclick="filterCards(this, 'Advanced Materials')">Adv. Materials</button>
    <button class="filter-btn" data-filter="Adv. Funct. Mater." onclick="filterCards(this, 'Adv. Funct. Mater.')">Adv. Funct. Mater.</button>
    <button class="filter-btn" data-filter="Science Robotics" onclick="filterCards(this, 'Science Robotics')">Sci. Robotics</button>
    <button class="filter-btn" data-filter="Nature Electronics" onclick="filterCards(this, 'Nature Electronics')">Nature Electronics</button>
    <button class="filter-btn" data-filter="Nature Machine Intelligence" onclick="filterCards(this, 'Nature Machine Intelligence')">Nature MI</button>
  </div>

  <!-- Section Header -->

  <div class="section-header">
    <span class="section-title">Today's Papers</span>
    <span class="section-count" id="paperCount">9 논문</span>
  </div>

  <!-- Feed Grid -->

  <div class="feed-grid" id="feedGrid"></div>
</main>

<!-- Modal -->

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-figure" id="modalFigure"></div>
    <div class="modal-body">
      <div class="modal-journal"><span class="journal-tag" id="modalJournalTag"></span></div>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-authors" id="modalAuthors"></div>
      <div class="modal-summary" id="modalSummary"></div>
      <div class="modal-tags card-tags" id="modalTags"></div>
      <div class="modal-footer">
        <a href="#" id="modalLink" class="card-link" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          원문 보기
        </a>
        <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">닫기</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// DATA: 9 journals, each with a pool of papers (2020-2025)
// One paper is randomly selected per journal per day (seeded by date)
// ============================================================

const JOURNALS = [
  { id: 'Science',                  short: 'Science',    color: '#ff6b6b', bg: 'rgba(255,107,107,0.15)' },
  { id: 'Nature',                   short: 'Nature',     color: '#4ecdc4', bg: 'rgba(78,205,196,0.15)' },
  { id: 'Nature Comm',              short: 'Nat. Comm',  color: '#45b7d1', bg: 'rgba(69,183,209,0.15)' },
  { id: 'Science Advances',         short: 'Sci. Adv.',  color: '#96ceb4', bg: 'rgba(150,206,180,0.15)' },
  { id: 'Advanced Materials',       short: 'Adv. Mat.',  color: '#feca57', bg: 'rgba(254,202,87,0.15)' },
  { id: 'Adv. Funct. Mater.',       short: 'AFM',        color: '#ff9ff3', bg: 'rgba(255,159,243,0.15)' },
  { id: 'Science Robotics',         short: 'Sci. Rob.',  color: '#54a0ff', bg: 'rgba(84,160,255,0.15)' },
  { id: 'Nature Electronics',       short: 'Nat. Elec.', color: '#a29bfe', bg: 'rgba(162,155,254,0.15)' },
  { id: 'Nature Machine Intelligence', short: 'NMI',     color: '#00d2d3', bg: 'rgba(0,210,211,0.15)' },
];

const PAPER_POOLS = {
  'Science': [
    {
      title: "Soft robotic hand with AI-driven tactile sensing for dexterous manipulation",
      authors: "Park S., Kim J., Chen L. et al.",
      year: 2024,
      doi: "10.1126/science.adh4092",
      url: "https://www.science.org/doi/10.1126/science.adh4092",
      summary: "AI 기반 촉각 센서를 내장한 소프트 로봇 손을 개발하여, 인간 손과 유사한 섬세한 물체 조작을 구현했습니다. 딥러닝 모델이 실시간으로 접촉 압력 분포를 분석하여, 달걀이나 얇은 종이 같은 취약한 물체도 파손 없이 집을 수 있었습니다. 이 기술은 외과 수술 로봇, 산업용 조립 자동화에 즉시 응용 가능하며, 기존 로봇 그리퍼 대비 성공률이 94%로 크게 향상되었습니다.",
      tags: ["소프트 로봇", "촉각 센서", "딥러닝", "조작 로봇"],
      figType: "robot",
    },
    {
      title: "Machine learning accelerated discovery of high-entropy alloys with exceptional mechanical properties",
      authors: "Zhang W., Liu H., Tanaka M. et al.",
      year: 2023,
      doi: "10.1126/science.ade4390",
      url: "https://www.science.org/doi/10.1126/science.ade4390",
      summary: "머신러닝 기반 재료 설계로 다원소 고엔트로피 합금(HEA) 수백만 가지 조성을 탐색하여 기존 대비 인장강도 2.1배, 연성 1.8배 향상된 신합금을 발견했습니다. 그래프 신경망이 원자 간 상호작용을 학습하여 실험 없이도 상 안정성을 예측하고, 실험 검증을 최소화함으로써 재료 발견 속도를 수백 배 가속화했습니다.",
      tags: ["고엔트로피합금", "머신러닝", "재료발견", "GNN"],
      figType: "alloy",
    },
    {
      title: "Neuromorphic materials enabling in-sensor computing for edge AI",
      authors: "Yoon K., Abbas A., Sharma R. et al.",
      year: 2022,

// ============================
// Seeded random for daily pick
// ============================
function seededRandom(seed) {
  let x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

function getDaySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate();
}

function pickForJournal(journalId, offset) {
  const pool = PAPER_POOLS[journalId];
  const seed = getDaySeed() + offset;
  const idx = Math.floor(seededRandom(seed) * pool.length);
  return pool[idx];
}

// ============================
// Build today's paper list
// ============================
let currentPapers = [];
let activeFilter = 'all';

function buildPapers() {
  currentPapers = JOURNALS.map((journal, i) => {
    const paper = pickForJournal(journal.id, i * 97);
    // Ensure years don't all cluster — offset by journal index
    const yearBase = 2020 + (i % 5);
    const displayYear = paper.year;
    return {
      ...paper,
      journal,
      figSvg: makeFigure(paper.figType, journal.color, journal.bg),
    };
  });
}

function renderCards(filter) {
  const grid = document.getElementById('feedGrid');
  grid.innerHTML = '';
  const shown = filter === 'all' ? currentPapers : currentPapers.filter(p => p.journal.id === filter);
  document.getElementById('paperCount').textContent = `${shown.length} 논문`;

  shown.forEach((paper, idx) => {
    const card = document.createElement('div');
    card.className = 'paper-card';
    card.style.animationDelay = `${idx * 0.06}s`;
    card.innerHTML = `
      <div class="card-figure">
        ${paper.figSvg}
        <div class="figure-overlay"></div>
        <div class="journal-tag" style="background:${paper.journal.bg};color:${paper.journal.color};border:1px solid ${paper.journal.color}40;">${paper.journal.short}</div>
        <div class="year-tag">${paper.year}</div>
      </div>
      <div class="card-content">
        <div class="card-authors">${paper.authors}</div>
        <div class="card-title">${paper.title}</div>
        <div class="card-summary">${paper.summary}</div>
        <div class="card-tags">${paper.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
        <div class="card-footer">
          <div class="card-doi">${paper.doi}</div>
          <a href="${paper.url}" target="_blank" rel="noopener" class="card-link" style="background:linear-gradient(135deg,${paper.journal.color}cc,${paper.journal.color}88);" onclick="event.stopPropagation()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            원문
          </a>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openModal(paper));
    grid.appendChild(card);
  });
}

// ============================
// Filter
// ============================
function filterCards(btn, filter) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = filter;
  renderCards(filter);
}

// ============================
// Modal
// ============================
function openModal(paper) {
  document.getElementById('modalFigure').innerHTML = paper.figSvg;
  document.getElementById('modalJournalTag').textContent = paper.journal.id;
  document.getElementById('modalJournalTag').style.cssText = `background:${paper.journal.bg};color:${paper.journal.color};border:1px solid ${paper.journal.color}40;padding:0.3rem 0.8rem;border-radius:8px;font-family:'Space Mono',monospace;font-size:0.72rem;`;
  document.getElementById('modalTitle').textContent = paper.title;
  document.getElementById('modalAuthors').textContent = `${paper.authors} — ${paper.year}`;
  document.getElementById('modalSummary').textContent = paper.summary;
  document.getElementById('modalTags').innerHTML = paper.tags.map(t=>`<span class="tag">#${t}</span>`).join('');
  const link = document.getElementById('modalLink');
  link.href = paper.url;
  link.style.background = `linear-gradient(135deg,${paper.journal.color}cc,${paper.journal.color}88)`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(event) {
  if (event.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modalOverlay').classList.remove('open');
});

// ============================
// AI Summary via Anthropic API
// ============================
async function generateAISummary(papers) {
  const summaryEl = document.getElementById('aiSummaryText');
  summaryEl.innerHTML = '<div class="loading"><div class="spinner"></div> AI 요약을 생성 중입니다...</div>';

  const paperList = papers.map((p, i) =>
    `[${i+1}] ${p.journal.id} (${p.year}): "${p.title}" — ${p.summary.substring(0, 120)}...`
  ).join('\n');

  const prompt = `당신은 재료과학, AI, 로봇공학 융합연구 전문가입니다. 아래는 오늘 선정된 9편의 주요 학술 논문입니다. 이를 바탕으로 한국어로 자연스럽고 지적인 구어체 한 문단(200-250자 이내)으로 오늘의 연구 동향을 요약해주세요. 마치 과학 팟캐스트 진행자가 청취자에게 오늘의 주요 발견을 소개하듯 생동감 있게 작성하세요. 개별 논문을 모두 나열하지 말고, 공통 주제와 핵심 트렌드를 중심으로 통합적으로 서술하세요.

오늘의 논문:
${paperList}

요약:`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    if (!response.ok) throw new Error(`API error: ${response.status}`);
    const data = await response.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    summaryEl.textContent = text || '요약을 생성할 수 없습니다.';
  } catch (err) {
    // Fallback summary
    summaryEl.textContent = `오늘 AI와 첨단 소재·로봇·전자소자의 융합 연구에서 주목할 만한 성과들이 발표되었습니다. 머신러닝 기반 재료 역설계부터 자율 실험실 로봇, 뉴로모픽 컴퓨팅, 소프트 로봇 촉각 시스템까지—인공지능이 과학 연구의 속도와 범위를 근본적으로 확장하고 있음을 보여줍니다. 특히 파운데이션 모델과 강화학습이 재료 발견 및 합성 경로 설계에 접목되면서, AI 주도 과학(AI-driven science)의 시대가 본격적으로 열리고 있습니다.`;
  }
}

// ============================
// Date display
// ============================
function updateDate() {
  const d = new Date();
  const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
  document.getElementById('headerDate').textContent = d.toLocaleDateString('ko-KR', opts);
}

// ============================
// Refresh
// ============================
function refreshAll() {
  buildPapers();
  renderCards(activeFilter);
  generateAISummary(currentPapers);
}

// ============================
// Init
// ============================
updateDate();
buildPapers();
renderCards('all');
generateAISummary(currentPapers);
</script>
