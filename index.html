<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Lab News</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
background: #f0f2f7;
color: #1a1a2e;
font-family: ‘Noto Sans KR’, sans-serif;
min-height: 100vh;
}

/* ── Header ─────────────────────────────── */
header {
position: sticky; top: 0; z-index: 200;
background: #ffffff;
border-bottom: 1px solid #e0e2ea;
box-shadow: 0 1px 8px rgba(0,0,0,.08);
}
.hinner {
max-width: 1360px; margin: 0 auto;
padding: 0 1.5rem; height: 60px;
display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.logo { display: flex; align-items: center; gap: .7rem; }
.logo-icon {
width: 34px; height: 34px; border-radius: 9px;
background: linear-gradient(135deg, #4356e8, #00a98a);
display: flex; align-items: center; justify-content: center;
font-size: 17px; flex-shrink: 0;
}
.logo-name { font-family: ‘Space Mono’, monospace; font-size: .92rem; font-weight: 700; color: #1a1a2e; }
.logo-sub  { font-size: .58rem; color: #9090aa; letter-spacing: .1em; text-transform: uppercase; }
.hdate { font-family: ‘Space Mono’, monospace; font-size: .7rem; color: #9090aa; }
.reload-btn {
background: linear-gradient(135deg, #4356e8, #00a98a);
border: none; border-radius: 8px; color: #fff;
padding: .42rem 1.1rem; font-size: .78rem; font-family: ‘Noto Sans KR’, sans-serif;
font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0;
box-shadow: 0 2px 10px rgba(67,86,232,.28);
transition: opacity .2s, transform .15s;
}
.reload-btn:hover  { opacity: .85; transform: translateY(-1px); }
.reload-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

/* ── Main ────────────────────────────────── */
main { max-width: 1360px; margin: 0 auto; padding: 1.6rem 1.5rem 5rem; }

/* ── Notice ─────────────────────────────── */

/* ── Progress ───────────────────────────── */
#progWrap { margin-bottom: 1.1rem; display: none; }
.progbar { height: 4px; background: #e0e2ea; border-radius: 2px; overflow: hidden; }
.progfill { height: 100%; width: 0%; background: linear-gradient(90deg, #4356e8, #00a98a); border-radius: 2px; transition: width .35s ease; }
#progMsg { font-family: ‘Space Mono’, monospace; font-size: .62rem; color: #9090aa; margin-top: .4rem; }

/* ── Filter ─────────────────────────────── */
.filterbar { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: 1.3rem; align-items: center; }
.flabel { font-family: ‘Space Mono’, monospace; font-size: .61rem; letter-spacing: .1em; text-transform: uppercase; color: #9090aa; margin-right: .3rem; }
.ftag {
border: 1px solid #d8dae6; background: #fff;
border-radius: 20px; padding: .25rem .65rem;
font-size: .69rem; font-family: ‘Noto Sans KR’, sans-serif;
color: #44445a; cursor: pointer; white-space: nowrap;
transition: all .14s; box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.ftag:hover { background: #f0f1ff; border-color: #a0a8f0; color: #4356e8; }
.ftag.on { background: #4356e8; border-color: #4356e8; color: #fff; box-shadow: 0 2px 8px rgba(67,86,232,.3); }

/* ── Section head ───────────────────────── */
.sechead { display: flex; align-items: baseline; gap: .7rem; margin-bottom: 1rem; }
.sectitle { font-family: ‘Space Mono’, monospace; font-size: .62rem; letter-spacing: .15em; text-transform: uppercase; color: #9090aa; }
#pcount { font-family: ‘Space Mono’, monospace; font-size: .62rem; color: #9090aa; }

/* ── Grid ───────────────────────────────── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.2rem; }

/* ── Card ───────────────────────────────── */
.card {
background: #ffffff;
border: 1px solid #e2e4ee;
border-radius: 15px; overflow: hidden;
box-shadow: 0 2px 10px rgba(0,0,0,.055);
transition: transform .2s, box-shadow .2s;
opacity: 0; animation: fu .4s forwards;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,.11); }
@keyframes fu { to { opacity:1; transform:translateY(0); } }
.card:nth-child(1){animation-delay:.03s} .card:nth-child(2){animation-delay:.07s}
.card:nth-child(3){animation-delay:.11s} .card:nth-child(4){animation-delay:.15s}
.card:nth-child(5){animation-delay:.19s} .card:nth-child(6){animation-delay:.23s}
.card:nth-child(7){animation-delay:.27s} .card:nth-child(8){animation-delay:.31s}
.card:nth-child(9){animation-delay:.35s}

.card-top { height: 4px; }
.card-body { padding: 1.05rem 1.25rem 1.25rem; }

.card-meta { display: flex; align-items: center; gap: .4rem; margin-bottom: .62rem; flex-wrap: wrap; }
.jtag {
padding: .2rem .56rem; border-radius: 6px;
font-family: ‘Space Mono’, monospace; font-size: .72rem; font-weight: 700; letter-spacing: .02em;
}
.ytag { font-family: ‘Space Mono’, monospace; font-size: .72rem; color: #9090aa; margin-left: auto; }

.card-title {
font-family: ‘Playfair Display’, serif; font-size: 1.08rem; line-height: 1.46;
color: #1a1a2e; margin-bottom: .6rem;
}
.card-auth {
font-size: .74rem; color: #9090aa; font-family: ‘Space Mono’, monospace;
margin-bottom: .68rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sum-label {
font-size: .57rem; letter-spacing: .08em; text-transform: uppercase;
font-family: ‘Space Mono’, monospace; color: #00a98a; font-weight: 700; margin-bottom: .26rem;
}
.card-sum {
font-size: .9rem; line-height: 1.78; color: #44445a; margin-bottom: .95rem;
}
.card-sum.pend { color: #9090aa; font-style: italic; }
.card-sum.fail { color: #c03030; font-size: .73rem; }

.card-foot {
display: flex; align-items: center; justify-content: space-between;
padding-top: .78rem; border-top: 1px solid #eef0f6; gap: .4rem;
}
.card-doi { font-size: .59rem; color: #b0b0c0; font-family: ‘Space Mono’, monospace; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-link {
display: inline-flex; align-items: center; gap: .3rem;
padding: .3rem .82rem; border-radius: 7px;
font-size: .69rem; font-weight: 600; color: #fff; text-decoration: none;
flex-shrink: 0; white-space: nowrap;
box-shadow: 0 2px 6px rgba(0,0,0,.14);
transition: opacity .14s, transform .14s;
}
.card-link:hover { opacity: .82; transform: translateY(-1px); }
.card-link svg { width: 10px; height: 10px; }

/* ── Empty state ─────────────────────────── */
.empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: #9090aa; }
.empty-icon { font-size: 2.4rem; display: block; margin-bottom: .85rem; }
.empty h3 { font-family: ‘Playfair Display’, serif; font-size: 1.1rem; color: #44445a; margin-bottom: .42rem; }
.empty p  { font-size: .77rem; line-height: 1.7; max-width: 440px; margin: 0 auto; }

/* ── Spinner ─────────────────────────────── */
.sp {
display: inline-block; width: 12px; height: 12px;
border: 2px solid #d8dae6; border-top-color: #4356e8;
border-radius: 50%; animation: spin .65s linear infinite;
vertical-align: middle; margin-right: .32rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

.site-footer {
margin-top: 2.5rem; padding: 1.2rem 0 .5rem;
border-top: 1px solid #e2e4ee;
text-align: center; font-size: .72rem; color: #9090aa; line-height: 1.9;
}
.site-footer a { color: #9090aa; text-decoration: underline; }
.site-footer a:hover { color: #4356e8; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #f0f2f7; }
::-webkit-scrollbar-thumb { background: #ccd; border-radius: 3px; }

/* ── Keyword search bar ─────────────────── */
.kwbox {
display: flex; gap: .6rem; align-items: center;
background: #fff; border: 1px solid #d8dae6;
border-radius: 13px; padding: .7rem 1rem;
margin-bottom: 1.3rem;
box-shadow: 0 1px 6px rgba(0,0,0,.05);
}
.kwbox-icon { font-size: 1.1rem; flex-shrink: 0; }
.kw-inner { flex: 1; display: flex; flex-direction: column; gap: .28rem; }
.kw-label { font-family: ‘Space Mono’, monospace; font-size: .6rem; letter-spacing: .1em; text-transform: uppercase; color: #9090aa; }
.kw-row { display: flex; gap: .5rem; align-items: center; }
.kw-input {
flex: 1; border: 1px solid #d8dae6; border-radius: 8px;
padding: .4rem .7rem; font-size: .82rem; font-family: ‘Noto Sans KR’, sans-serif;
color: #1a1a2e; outline: none; background: #f8f9fc;
transition: border-color .15s, box-shadow .15s;
}
.kw-input:focus { border-color: #4356e8; box-shadow: 0 0 0 3px rgba(67,86,232,.1); background: #fff; }
.kw-input::placeholder { color: #b0b0c0; }
.kw-btn {
background: linear-gradient(135deg, #4356e8, #00a98a);
border: none; border-radius: 8px; color: #fff;
padding: .4rem 1rem; font-size: .76rem; font-family: ‘Noto Sans KR’, sans-serif;
font-weight: 600; cursor: pointer; white-space: nowrap; flex-shrink: 0;
box-shadow: 0 2px 8px rgba(67,86,232,.25);
transition: opacity .15s, transform .15s;
}
.kw-btn:hover { opacity: .85; transform: translateY(-1px); }
.kw-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
.kw-chips { display: flex; flex-wrap: wrap; gap: .3rem; margin-top: .15rem; }
.kw-chip {
background: #f0f1ff; border: 1px solid #c8cdf5;
border-radius: 12px; padding: .15rem .55rem;
font-size: .63rem; color: #4356e8; font-family: ‘Noto Sans KR’, sans-serif;
}
.kw-chip.active {
background: #4356e8; border-color: #4356e8; color: #fff;
font-weight: 700;
}

@media (max-width: 680px) {
.grid { grid-template-columns: 1fr; }
.hinner { padding: 0 1rem; }
main { padding: 1.1rem 1rem 4rem; }
.hdate { display: none; }
}
</style>

</head>
<body>

<header>
  <div class="hinner">
    <div class="logo">
      <div class="logo-icon">⚛</div>
      <div>
        <div class="logo-name">Daily Lab News</div>
      </div>
    </div>
    <div class="hdate" id="hdate"></div>
    <button class="reload-btn" id="reloadBtn" onclick="load()">🔄 새 논문 보기</button>
  </div>
</header>

<main>
  <div id="progWrap">
    <div class="progbar"><div class="progfill" id="progFill"></div></div>
    <div id="progMsg">준비 중...</div>
  </div>

  <div class="filterbar">
    <span class="flabel">저널</span>
    <button class="ftag on"  onclick="setFilter(this,'all')">전체</button>
    <button class="ftag" onclick="setFilter(this,'Advanced Functional Materials')">Advanced Functional Materials</button>
    <button class="ftag" onclick="setFilter(this,'Science Advances')">Science Advances</button>
    <button class="ftag" onclick="setFilter(this,'Science Robotics')">Science Robotics</button>
    <button class="ftag" onclick="setFilter(this,'Advanced Materials')">Advanced Materials</button>
    <button class="ftag" onclick="setFilter(this,'Nature Communications')">Nature Communications</button>
    <button class="ftag" onclick="setFilter(this,'Science')">Science</button>
    <button class="ftag" onclick="setFilter(this,'Nature')">Nature</button>
  </div>

  <div class="sechead">
    <span class="sectitle">TODAY'S PAPERS</span>
    <span id="pcount"></span>
  </div>

  <div class="grid" id="grid">
    <div class="empty">
      <span class="empty-icon">⏳</span>
      <h3>논문 불러오는 중...</h3>
      <p>잠시만 기다려 주세요.</p>
    </div>
  </div>
  <!-- Keyword search bar (bottom) -->
  <div class="kwbox">
    <div class="kwbox-icon">🔍</div>
    <div class="kw-inner">
      <div class="kw-label">추가 키워드 검색 (최우선 적용)</div>
      <div class="kw-row">
        <input class="kw-input" id="kwInput" type="text"
          placeholder="예: wearable sensor, triboelectric, hydrogel actuator..."
          onkeydown="if(event.key==='Enter') applyKeyword()">
        <button class="kw-btn" id="kwBtn" onclick="applyKeyword()">🔄 업데이트</button>
      </div>
      <div class="kw-chips" id="kwChips"></div>
    </div>
  </div>

  <footer class="site-footer">
    <p>© 2026 정임두. All rights reserved.</p>
    <p>Research paper data provided by <a href="https://crossref.org" target="_blank" rel="noopener">CrossRef</a>. Translation by Google Translate.</p>
  </footer>
</main>

<script>
// ================================================================
// JOURNALS — CrossRef ISSN
// ================================================================
const JOURNALS = [
  { id:'Advanced Functional Materials', short:'Advanced Functional Materials',         issn:'1616-3028', color:'#b44ec8', bg:'#fdf2ff',
    q:'functional material smart device electrochromic wearable flexible sensor actuator' },
  { id:'Science Advances',              short:'Science Advances',    issn:'2375-2548', color:'#4caf7d', bg:'#edfaf3',
    q:'machine learning materials manufacturing device fabrication printed electronics' },
  { id:'Science Robotics',              short:'Science Robotics',    issn:'2470-9476', color:'#1e9ed4', bg:'#edf8ff',
    q:'soft robot autonomous locomotion manipulation gripper tactile machine learning' },
  { id:'Advanced Materials',            short:'Advanced Materials',    issn:'0935-9648', color:'#e0922a', bg:'#fff8ee',
    q:'soft robotics electrochromic perovskite wearable sensor actuator conductive polymer' },
  { id:'Nature Communications',         short:'Nature Communications',    issn:'2041-1723', color:'#3a80d2', bg:'#edf4ff',
    q:'machine learning materials device fabrication printed electronics robot sensor' },
  { id:'Science',                       short:'Science',     issn:'0036-8075', color:'#e05252', bg:'#fff0f0',
    q:'artificial intelligence materials robot semiconductor photovoltaic actuator' },
  { id:'Nature',                        short:'Nature',      issn:'0028-0836', color:'#2a9d6e', bg:'#edfaf4',
    q:'machine learning materials robotics device semiconductor photovoltaic' },
];

// ================================================================
// BASE TOPICS — always included in every journal query
// ================================================================
const BASE_TOPICS = [
  'soft robotics', 'functional materials', 'machine learning',
  'smart contact lens', 'perovskite', 'image sensing',
  'meniscus guided printing', 'electrochromic',
  'wearable sensor', 'flexible electronics'
].join(' ');

let customKeyword = ''; // user-entered keyword (highest priority)

// Build query: custom keyword first (most relevant), then base topics
function buildQuery(journalQ) {
  const parts = [];
  if (customKeyword.trim()) parts.push(customKeyword.trim());
  parts.push(BASE_TOPICS);
  parts.push(journalQ);
  return parts.join(' ');
}

const CR = 'https://api.crossref.org/journals';
const MT = 'https://api.mymemory.translated.net/get';
const MAILTO = 'mailto=aimaterialsdaily@example.com';

let papers = [];
let curFilter = 'all';
let busy = false;

// ================================================================
// MAIN LOAD
// ================================================================
async function load() {
  if (busy) return;
  busy = true;

  const btn = document.getElementById('reloadBtn');
  btn.disabled = true; btn.textContent = '⏳ 불러오는 중...';

  papers = [];
  showProg(true); setProgress(0, '저널에 연결 중...');
  renderGrid();

  // 1) Fetch all journal papers in parallel
  let done = 0;
  await Promise.allSettled(JOURNALS.map(j =>
    fetchOne(j).then(p => {
      papers.push(p);
      done++;
      setProgress(Math.round(done / JOURNALS.length * 45),
        `${done}/${JOURNALS.length} 저널 수집 완료`);
    })
  ));

  // sort to original order, assign IDs
  papers.sort((a, b) =>
    JOURNALS.findIndex(j => j.id === a.journal.id) -
    JOURNALS.findIndex(j => j.id === b.journal.id)
  );
  papers.forEach((p, i) => p._id = i);
  renderGrid();

  // 2) Translate abstracts — sequential to respect free API rate limit
  const valid = papers.filter(p => p.title && p.abstract);
  for (let i = 0; i < valid.length; i++) {
    await translate(valid[i]);
    setProgress(45 + Math.round((i + 1) / valid.length * 50),
      `번역 중 ${i + 1}/${valid.length}`);
    // small delay between calls to be polite to the free API
    if (i < valid.length - 1) await sleep(300);
  }

  setProgress(100, '완료!');
  setTimeout(() => showProg(false), 900);

  btn.disabled = false; btn.textContent = '🔄 새 논문 보기';
  busy = false;
}

// ================================================================
// CrossRef fetch — single clean query per journal, fast
// ================================================================
function buildQuery(j) {
  const parts = [];
  if (customKeyword.trim()) parts.push(customKeyword.trim());
  parts.push(j.q);
  return parts.join(' ');
}

async function fetchOne(j) {
  // Try 2 queries: specific first, then broad fallback
  const queries = [
    buildQuery(j),
    'machine learning materials device sensor actuator flexible electronics'
  ];

  for (const query of queries) {
    try {
      // Keep URL short — CrossRef works better with concise queries
      const q = encodeURIComponent(query.slice(0, 200));
      const today = new Date();
      const toDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
      const url = `${CR}/${j.issn}/works?query=${q}` +
        `&filter=from-pub-date:2020-01-01,until-pub-date:${toDate},type:journal-article,has-abstract:1` +
        `&sort=published&order=desc&rows=50` +
        `&select=DOI,title,author,published,abstract,URL&${MAILTO}`;

      const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
      if (!r.ok) { console.warn(j.short, 'HTTP', r.status); continue; }
      const d = await r.json();

      const items = (d?.message?.items || []).filter(it =>
        it.title?.[0] && it.title[0].length > 15 &&
        it.abstract && it.abstract.length > 50
      );
      if (!items.length) { console.warn(j.short, 'no items in tier'); continue; }

      const pick = items[Math.floor(Math.random() * items.length)];
      const authors = (pick.author || []).slice(0, 4)
        .map(a => `${a.family || ''} ${(a.given || '').charAt(0)}.`.trim())
        .join(', ') + ((pick.author?.length || 0) > 4 ? ' et al.' : '');
      const year = pick.published?.['date-parts']?.[0]?.[0] || '';
      const doi  = pick.DOI || '';
      const link = doi ? `https://doi.org/${doi}` : (pick.URL || '#');
      const abstract = (pick.abstract || '')
        .replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();

      return { journal: j, title: pick.title[0], authors, year, doi, link, abstract, summaryKo: null, _id: null };
    } catch (err) {
      console.warn(j.id, 'fetch error:', err.message);
      continue;
    }
  }
  return { journal: j, title: null, error: `연결 실패 — CrossRef에서 응답 없음`, _id: null };
}

// ================================================================
// Translation — Google Translate (unofficial, no key needed)
// Falls back to MyMemory, then original text
// ================================================================
async function translate(p) {
  const text = p.abstract;
  const chunks = splitChunks(text, 4500); // Google supports up to ~5000 chars
  const translated = [];

  for (let i = 0; i < chunks.length; i++) {
    const result = await translateChunk(chunks[i]);
    translated.push(result);
    if (i < chunks.length - 1) await sleep(300);
  }

  const joined = translated.join(' ').trim();
  p.summaryKo = isKorean(joined) ? joined : '(번역 실패) ' + text;
  patchCard(p);
}

function splitChunks(text, maxLen) {
  if (text.length <= maxLen) return [text];
  const sentences = text.match(/[^.!?]+[.!?]+\s*/g) || [text];
  const chunks = [];
  let cur = '';
  for (const s of sentences) {
    if (cur.length + s.length > maxLen && cur) {
      chunks.push(cur.trim());
      cur = s;
    } else {
      cur += s;
    }
  }
  if (cur.trim()) chunks.push(cur.trim());
  const result = [];
  for (const ch of chunks) {
    if (ch.length <= maxLen) { result.push(ch); continue; }
    for (let j = 0; j < ch.length; j += maxLen) result.push(ch.slice(j, j + maxLen));
  }
  return result;
}

async function translateChunk(text) {
  // ── 1st try: Google Translate unofficial endpoint ──
  try {
    const url = 'https://translate.googleapis.com/translate_a/single' +
      '?client=gtx&sl=en&tl=ko&dt=t&q=' + encodeURIComponent(text);
    const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
    if (r.ok) {
      const d = await r.json();
      // Response: [[[translated, original, ...], ...], ...]
      if (Array.isArray(d) && Array.isArray(d[0])) {
        const t = d[0].map(seg => seg[0] || '').join('').trim();
        if (isKorean(t) && t.length > 3) return t;
      }
    }
  } catch (_) {}

  // ── 2nd try: MyMemory ──
  try {
    const url = 'https://api.mymemory.translated.net/get' +
      '?q=' + encodeURIComponent(text.slice(0, 500)) +
      '&langpair=en%7Cko';
    const r = await fetch(url, { signal: AbortSignal.timeout(10000) });
    if (r.ok) {
      const d = await r.json();
      if (d.responseStatus === 200) {
        const t = (d.responseData?.translatedText || '').trim();
        if (isKorean(t) && t.length > 3) return t;
      }
    }
  } catch (_) {}

  // ── Fallback: original text ──
  return text;
}

// Check if string contains Korean characters
function isKorean(s) {
  return /[\uAC00-\uD7AF\u3131-\u318E]/.test(s);
}

// ================================================================
// KEYWORD UPDATE
// ================================================================
function applyKeyword() {
  const input = document.getElementById('kwInput');
  const val = input.value.trim();
  customKeyword = val;
  renderChips();
  // reload everything with new keyword
  load();
}

function renderChips() {
  const chips = document.getElementById('kwChips');
  const baseList = BASE_TOPICS.split(', ').length > 1
    ? BASE_TOPICS.split(' ')
        .reduce((a, w) => { /* group back into phrases roughly */
          if (a.length && a[a.length-1].split(' ').length < 2 && w.length > 3) {
            a[a.length-1] += ' ' + w; return a;
          }
          a.push(w); return a;
        }, [])
    : [BASE_TOPICS];

  const baseTopics = [
    'soft robotics','functional materials','machine learning',
    'smart contact lens','perovskite','image sensing',
    'meniscus guided printing','electrochromic',
    'wearable sensor','flexible electronics'
  ];

  let html = '';
  if (customKeyword) {
    html += `<span class="kw-chip active">✦ ${x(customKeyword)}</span>`;
  }
  baseTopics.forEach(t => {
    html += `<span class="kw-chip">${x(t)}</span>`;
  });
  chips.innerHTML = html;
}

function setFilter(btn, f) {
  document.querySelectorAll('.ftag').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  curFilter = f;
  renderGrid();
}
function showProg(v) { document.getElementById('progWrap').style.display = v ? 'block' : 'none'; }
function setProgress(pct, msg) {
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progMsg').textContent = msg;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function x(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
