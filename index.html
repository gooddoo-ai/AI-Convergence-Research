<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI×Materials Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Space+Mono:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
background: #f0f2f7;
color: #1a1a2e;
font-family: ‘Noto Sans KR’, sans-serif;
min-height: 100vh;
}

/* ── Header ─────────────────────────────── */
header {
position: sticky; top: 0; z-index: 200;
background: #ffffff;
border-bottom: 1px solid #e0e2ea;
box-shadow: 0 1px 8px rgba(0,0,0,.08);
}
.hinner {
max-width: 1360px; margin: 0 auto;
padding: 0 1.5rem; height: 60px;
display: flex; align-items: center; justify-content: space-between; gap: 1rem;
}
.logo { display: flex; align-items: center; gap: .7rem; }
.logo-icon {
width: 34px; height: 34px; border-radius: 9px;
background: linear-gradient(135deg, #4356e8, #00a98a);
display: flex; align-items: center; justify-content: center;
font-size: 17px; flex-shrink: 0;
}
.logo-name { font-family: ‘Space Mono’, monospace; font-size: .92rem; font-weight: 700; color: #1a1a2e; }
.logo-sub  { font-size: .58rem; color: #9090aa; letter-spacing: .1em; text-transform: uppercase; }
.hdate { font-family: ‘Space Mono’, monospace; font-size: .7rem; color: #9090aa; }
.reload-btn {
background: linear-gradient(135deg, #4356e8, #00a98a);
border: none; border-radius: 8px; color: #fff;
padding: .42rem 1.1rem; font-size: .78rem; font-family: ‘Noto Sans KR’, sans-serif;
font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0;
box-shadow: 0 2px 10px rgba(67,86,232,.28);
transition: opacity .2s, transform .15s;
}
.reload-btn:hover  { opacity: .85; transform: translateY(-1px); }
.reload-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }

/* ── Main ────────────────────────────────── */
main { max-width: 1360px; margin: 0 auto; padding: 1.6rem 1.5rem 5rem; }

/* ── Notice ─────────────────────────────── */
.notice {
background: #eef9f6; border: 1px solid #b2e4d8;
border-radius: 12px; padding: .75rem 1.2rem;
margin-bottom: 1.3rem; font-size: .75rem; line-height: 1.65; color: #1a6e5a;
}
.notice strong { color: #00a98a; }

/* ── Briefing box ───────────────────────── */
.briefbox {
background: linear-gradient(135deg, #eef0fd, #eaf8f4);
border: 1px solid #c8cdf5;
border-radius: 16px; padding: 1.3rem 1.7rem;
margin-bottom: 1.7rem;
box-shadow: 0 2px 14px rgba(67,86,232,.06);
}
.brief-badge {
display: inline-flex; align-items: center; gap: .32rem;
background: rgba(67,86,232,.1); border: 1px solid rgba(67,86,232,.22);
border-radius: 20px; padding: .22rem .68rem;
font-size: .64rem; font-family: ‘Space Mono’, monospace; color: #4356e8;
margin-bottom: .6rem; letter-spacing: .04em;
}
.dot { color: #00a98a; animation: blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
.brief-title { font-family: ‘Playfair Display’, serif; font-size: 1.08rem; color: #1a1a2e; margin-bottom: .45rem; }
#briefText { font-size: .85rem; line-height: 1.82; color: #44445a; }
#briefText.wait { color: #9090aa; font-style: italic; }

/* ── Progress ───────────────────────────── */
#progWrap { margin-bottom: 1.1rem; display: none; }
.progbar { height: 4px; background: #e0e2ea; border-radius: 2px; overflow: hidden; }
.progfill { height: 100%; width: 0%; background: linear-gradient(90deg, #4356e8, #00a98a); border-radius: 2px; transition: width .35s ease; }
#progMsg { font-family: ‘Space Mono’, monospace; font-size: .62rem; color: #9090aa; margin-top: .4rem; }

/* ── Filter ─────────────────────────────── */
.filterbar { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: 1.3rem; align-items: center; }
.flabel { font-family: ‘Space Mono’, monospace; font-size: .61rem; letter-spacing: .1em; text-transform: uppercase; color: #9090aa; margin-right: .3rem; }
.ftag {
border: 1px solid #d8dae6; background: #fff;
border-radius: 20px; padding: .25rem .65rem;
font-size: .69rem; font-family: ‘Noto Sans KR’, sans-serif;
color: #44445a; cursor: pointer; white-space: nowrap;
transition: all .14s; box-shadow: 0 1px 3px rgba(0,0,0,.04);
}
.ftag:hover { background: #f0f1ff; border-color: #a0a8f0; color: #4356e8; }
.ftag.on { background: #4356e8; border-color: #4356e8; color: #fff; box-shadow: 0 2px 8px rgba(67,86,232,.3); }

/* ── Section head ───────────────────────── */
.sechead { display: flex; align-items: baseline; gap: .7rem; margin-bottom: 1rem; }
.sectitle { font-family: ‘Space Mono’, monospace; font-size: .62rem; letter-spacing: .15em; text-transform: uppercase; color: #9090aa; }
#pcount { font-family: ‘Space Mono’, monospace; font-size: .62rem; color: #9090aa; }

/* ── Grid ───────────────────────────────── */
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.2rem; }

/* ── Card ───────────────────────────────── */
.card {
background: #ffffff;
border: 1px solid #e2e4ee;
border-radius: 15px; overflow: hidden;
box-shadow: 0 2px 10px rgba(0,0,0,.055);
transition: transform .2s, box-shadow .2s;
opacity: 0; animation: fu .4s forwards;
}
.card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,.11); }
@keyframes fu { to { opacity:1; transform:translateY(0); } }
.card:nth-child(1){animation-delay:.03s} .card:nth-child(2){animation-delay:.07s}
.card:nth-child(3){animation-delay:.11s} .card:nth-child(4){animation-delay:.15s}
.card:nth-child(5){animation-delay:.19s} .card:nth-child(6){animation-delay:.23s}
.card:nth-child(7){animation-delay:.27s} .card:nth-child(8){animation-delay:.31s}
.card:nth-child(9){animation-delay:.35s}

.card-top { height: 4px; }
.card-body { padding: 1.05rem 1.25rem 1.25rem; }

.card-meta { display: flex; align-items: center; gap: .4rem; margin-bottom: .62rem; flex-wrap: wrap; }
.jtag {
padding: .2rem .56rem; border-radius: 6px;
font-family: ‘Space Mono’, monospace; font-size: .59rem; font-weight: 700; letter-spacing: .03em;
}
.ytag { font-family: ‘Space Mono’, monospace; font-size: .59rem; color: #9090aa; margin-left: auto; }

.card-title {
font-family: ‘Playfair Display’, serif; font-size: .95rem; line-height: 1.44;
color: #1a1a2e; margin-bottom: .52rem;
display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.card-auth {
font-size: .65rem; color: #9090aa; font-family: ‘Space Mono’, monospace;
margin-bottom: .62rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sum-label {
font-size: .57rem; letter-spacing: .08em; text-transform: uppercase;
font-family: ‘Space Mono’, monospace; color: #00a98a; font-weight: 700; margin-bottom: .26rem;
}
.card-sum {
font-size: .8rem; line-height: 1.72; color: #44445a; margin-bottom: .85rem;
display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical; overflow: hidden;
}
.card-sum.pend { color: #9090aa; font-style: italic; }
.card-sum.fail { color: #c03030; font-size: .73rem; }

.card-foot {
display: flex; align-items: center; justify-content: space-between;
padding-top: .78rem; border-top: 1px solid #eef0f6; gap: .4rem;
}
.card-doi { font-size: .59rem; color: #b0b0c0; font-family: ‘Space Mono’, monospace; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-link {
display: inline-flex; align-items: center; gap: .3rem;
padding: .3rem .82rem; border-radius: 7px;
font-size: .69rem; font-weight: 600; color: #fff; text-decoration: none;
flex-shrink: 0; white-space: nowrap;
box-shadow: 0 2px 6px rgba(0,0,0,.14);
transition: opacity .14s, transform .14s;
}
.card-link:hover { opacity: .82; transform: translateY(-1px); }
.card-link svg { width: 10px; height: 10px; }

/* ── Empty state ─────────────────────────── */
.empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: #9090aa; }
.empty-icon { font-size: 2.4rem; display: block; margin-bottom: .85rem; }
.empty h3 { font-family: ‘Playfair Display’, serif; font-size: 1.1rem; color: #44445a; margin-bottom: .42rem; }
.empty p  { font-size: .77rem; line-height: 1.7; max-width: 440px; margin: 0 auto; }

/* ── Spinner ─────────────────────────────── */
.sp {
display: inline-block; width: 12px; height: 12px;
border: 2px solid #d8dae6; border-top-color: #4356e8;
border-radius: 50%; animation: spin .65s linear infinite;
vertical-align: middle; margin-right: .32rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #f0f2f7; }
::-webkit-scrollbar-thumb { background: #ccd; border-radius: 3px; }

@media (max-width: 680px) {
.grid { grid-template-columns: 1fr; }
.hinner { padding: 0 1rem; }
main { padding: 1.1rem 1rem 4rem; }
.hdate { display: none; }
}
</style>

</head>
<body>

<header>
  <div class="hinner">
    <div class="logo">
      <div class="logo-icon">⚛</div>
      <div>
        <div class="logo-name">AI×Materials Daily</div>
        <div class="logo-sub">CrossRef API · 실제 논문</div>
      </div>
    </div>
    <div class="hdate" id="hdate"></div>
    <button class="reload-btn" id="reloadBtn" onclick="load()">🔄 새 논문 보기</button>
  </div>
</header>

<main>
  <div class="notice">
    <strong>📌 동작 방식</strong> —
    CrossRef API로 실제 출판 논문을 검색하고,
    <strong>MyMemory 무료 번역 API</strong>로 영문 초록을 한국어로 번역합니다.
    새로고침마다 다른 논문이 표시됩니다.
  </div>

  <div class="briefbox">
    <div class="brief-badge"><span class="dot">●</span> 오늘의 키워드 브리핑</div>
    <div class="brief-title">오늘의 논문 동향</div>
    <div id="briefText" class="wait">논문을 불러오는 중입니다...</div>
  </div>

  <div id="progWrap">
    <div class="progbar"><div class="progfill" id="progFill"></div></div>
    <div id="progMsg">준비 중...</div>
  </div>

  <div class="filterbar">
    <span class="flabel">저널</span>
    <button class="ftag on"  onclick="setFilter(this,'all')">전체</button>
    <button class="ftag" onclick="setFilter(this,'Science')">Science</button>
    <button class="ftag" onclick="setFilter(this,'Nature')">Nature</button>
    <button class="ftag" onclick="setFilter(this,'Nature Communications')">Nat. Comm</button>
    <button class="ftag" onclick="setFilter(this,'Science Advances')">Sci. Advances</button>
    <button class="ftag" onclick="setFilter(this,'Advanced Materials')">Adv. Materials</button>
    <button class="ftag" onclick="setFilter(this,'Advanced Functional Materials')">Adv. Funct. Mat.</button>
    <button class="ftag" onclick="setFilter(this,'Science Robotics')">Sci. Robotics</button>
    <button class="ftag" onclick="setFilter(this,'Nature Electronics')">Nat. Electronics</button>
    <button class="ftag" onclick="setFilter(this,'Nature Machine Intelligence')">Nat. Mach. Intell.</button>
  </div>

  <div class="sechead">
    <span class="sectitle">TODAY'S PAPERS</span>
    <span id="pcount"></span>
  </div>

  <div class="grid" id="grid">
    <div class="empty">
      <span class="empty-icon">⏳</span>
      <h3>논문 불러오는 중...</h3>
      <p>잠시만 기다려 주세요.</p>
    </div>
  </div>
</main>

<script>
// ================================================================
// JOURNALS — CrossRef ISSN
// ================================================================
const JOURNALS = [
  { id:'Science',                       short:'Science',    issn:'0036-8075', color:'#e05252', bg:'#fff0f0',
    q:'artificial intelligence machine learning materials robotics sensor' },
  { id:'Nature',                        short:'Nature',     issn:'0028-0836', color:'#2a9d6e', bg:'#edfaf4',
    q:'machine learning artificial intelligence materials robotics sensor' },
  { id:'Nature Communications',         short:'Nat.Comm',   issn:'2041-1723', color:'#3a80d2', bg:'#edf4ff',
    q:'machine learning deep learning neural network materials robotics' },
  { id:'Science Advances',              short:'Sci.Adv.',   issn:'2375-2548', color:'#4caf7d', bg:'#edfaf3',
    q:'artificial intelligence machine learning materials sensor robot' },
  { id:'Advanced Materials',            short:'Adv.Mat.',   issn:'0935-9648', color:'#e0922a', bg:'#fff8ee',
    q:'machine learning artificial intelligence deep learning neural' },
  { id:'Advanced Functional Materials', short:'AFM',        issn:'1616-3028', color:'#b44ec8', bg:'#fdf2ff',
    q:'machine learning artificial intelligence neural network smart' },
  { id:'Science Robotics',              short:'Sci.Rob.',   issn:'2470-9476', color:'#1e9ed4', bg:'#edf8ff',
    q:'machine learning deep learning artificial intelligence autonomous' },
  { id:'Nature Electronics',            short:'Nat.Elec.',  issn:'2520-1131', color:'#7b68ee', bg:'#f4f2ff',
    q:'machine learning neuromorphic artificial intelligence in-memory' },
  { id:'Nature Machine Intelligence',   short:'Nat.MI',     issn:'2522-5839', color:'#1bada0', bg:'#edfaf9',
    q:'materials chemistry robotics synthesis drug protein electronic' },
];

const CR = 'https://api.crossref.org/journals';
const MT = 'https://api.mymemory.translated.net/get';
const MAILTO = 'mailto=aimaterialsdaily@example.com';

let papers = [];
let curFilter = 'all';
let busy = false;

// ================================================================
// MAIN LOAD
// ================================================================
async function load() {
  if (busy) return;
  busy = true;

  const btn = document.getElementById('reloadBtn');
  btn.disabled = true; btn.textContent = '⏳ 불러오는 중...';

  papers = [];
  showProg(true); setProgress(0, '저널에 연결 중...');
  document.getElementById('briefText').className = 'wait';
  document.getElementById('briefText').textContent = '논문을 불러오는 중입니다...';
  renderGrid();

  // 1) Fetch all journal papers in parallel
  let done = 0;
  await Promise.allSettled(JOURNALS.map(j =>
    fetchOne(j).then(p => {
      papers.push(p);
      done++;
      setProgress(Math.round(done / JOURNALS.length * 45),
        `${done}/${JOURNALS.length} 저널 수집 완료`);
    })
  ));

  // sort to original order, assign IDs
  papers.sort((a, b) =>
    JOURNALS.findIndex(j => j.id === a.journal.id) -
    JOURNALS.findIndex(j => j.id === b.journal.id)
  );
  papers.forEach((p, i) => p._id = i);
  renderGrid();

  // 2) Translate abstracts — sequential to respect free API rate limit
  const valid = papers.filter(p => p.title && p.abstract);
  for (let i = 0; i < valid.length; i++) {
    await translate(valid[i]);
    setProgress(45 + Math.round((i + 1) / valid.length * 50),
      `번역 중 ${i + 1}/${valid.length}`);
    // small delay between calls to be polite to the free API
    if (i < valid.length - 1) await sleep(300);
  }

  // 3) Build briefing from translated summaries
  buildBriefing();

  setProgress(100, '완료!');
  setTimeout(() => showProg(false), 900);

  btn.disabled = false; btn.textContent = '🔄 새 논문 보기';
  busy = false;
}

// ================================================================
// CrossRef fetch — random every call
// ================================================================
async function fetchOne(j) {
  const url = `${CR}/${j.issn}/works?query=${encodeURIComponent(j.q)}` +
    `&filter=from-pub-date:2020-01-01&sort=relevance&rows=100` +
    `&select=DOI,title,author,published,abstract,URL&${MAILTO}`;
  try {
    const r = await fetch(url, { signal: AbortSignal.timeout(20000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();
    const items = (d?.message?.items || []).filter(it =>
      it.title?.[0] && it.title[0].length > 30
    );
    if (!items.length) throw new Error('결과 없음');

    const pick = items[Math.floor(Math.random() * items.length)];
    const authors = (pick.author || []).slice(0, 4)
      .map(a => `${a.family || ''} ${(a.given || '').charAt(0)}.`.trim())
      .join(', ') + (pick.author?.length > 4 ? ' et al.' : '');
    const year = pick.published?.['date-parts']?.[0]?.[0] || '';
    const doi  = pick.DOI || '';
    const link = doi ? `https://doi.org/${doi}` : (pick.URL || '#');
    const abstract = (pick.abstract || '')
      .replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();

    return { journal: j, title: pick.title[0], authors, year, doi, link, abstract, summaryKo: null, _id: null };
  } catch (err) {
    return { journal: j, title: null, error: err.message, _id: null };
  }
}

// ================================================================
// MyMemory translation (free, no API key, CORS open)
// Limit: ~500 chars per request, ~5000 chars/day free
// ================================================================
async function translate(p) {
  // Trim abstract to 500 chars for free tier
  const text = p.abstract.slice(0, 500);
  try {
    const url = `${MT}?q=${encodeURIComponent(text)}&langpair=en|ko`;
    const r = await fetch(url, { signal: AbortSignal.timeout(12000) });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    // MyMemory returns status 200 even for errors — check responseStatus
    if (d.responseStatus === 200 && d.responseData?.translatedText) {
      let t = d.responseData.translatedText;
      // Sometimes returns English back if quota exceeded
      if (isKorean(t)) {
        p.summaryKo = t;
        patchCard(p);
        return;
      }
    }
    // Fallback: quota likely exceeded, use original snippet
    throw new Error('번역 결과 없음 (할당량 초과 가능)');
  } catch (err) {
    p.summaryKo = `[번역 대기] ${p.abstract.slice(0, 300)}…`;
    patchCard(p);
  }
}

// Check if string contains Korean characters
function isKorean(s) {
  return /[\uAC00-\uD7AF\u3131-\u318E]/.test(s);
}

// ================================================================
// Build briefing from translated papers (no AI API needed)
// ================================================================
function buildBriefing() {
  const valid = papers.filter(p => p.title);
  if (!valid.length) return;

  // Collect unique keywords from titles
  const kw = extractKeywords(valid.map(p => p.title).join(' '));
  const journals = valid.map(p => p.journal.short).join(', ');
  const years = [...new Set(valid.map(p => p.year).filter(Boolean))].sort();

  const briefEl = document.getElementById('briefText');
  briefEl.className = '';
  briefEl.innerHTML =
    `오늘 <strong>${valid.length}개 저널</strong>(${journals})에서 ` +
    `AI·재료·로봇 융합 분야 논문 ${valid.length}편을 선정했습니다. ` +
    `${years.length ? years[0] + '~' + years[years.length-1] + '년' : ''} 출판된 논문들로, ` +
    `주요 키워드는 <strong>${kw.slice(0,6).join(', ')}</strong> 등입니다. ` +
    `각 카드의 한국어 번역을 참고하세요.`;
}

function extractKeywords(text) {
  const stop = new Set(['the','a','an','of','in','for','to','and','with','on','by','from',
    'is','are','was','were','that','this','which','be','as','at','we','our','these','their',
    'using','used','based','via','into','or','not','can','have','has','been','its','it']);
  const freq = {};
  text.toLowerCase().replace(/[^a-z\s]/g,' ').split(/\s+/)
    .filter(w => w.length > 4 && !stop.has(w))
    .forEach(w => { freq[w] = (freq[w]||0)+1; });
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([w])=>w);
}

// ================================================================
// Render
// ================================================================
function renderGrid() {
  const g = document.getElementById('grid');
  const shown = curFilter === 'all'
    ? papers
    : papers.filter(p => p.journal.id === curFilter);

  document.getElementById('pcount').textContent =
    papers.length ? `${shown.filter(p => p.title).length} 논문` : '';

  if (!papers.length) {
    g.innerHTML = `<div class="empty"><span class="empty-icon">⏳</span><h3>수집 중...</h3><p>잠시만 기다려 주세요.</p></div>`;
    return;
  }
  if (!shown.length) {
    g.innerHTML = `<div class="empty"><span class="empty-icon">🔍</span><h3>해당 저널 없음</h3></div>`;
    return;
  }
  g.innerHTML = shown.map((p, i) => cardHTML(p, i)).join('');
}

function cardHTML(p, i) {
  const j = p.journal;
  if (!p.title) {
    return `<div class="card" style="animation-delay:${i*.05}s">
      <div class="card-top" style="background:${j.color}55"></div>
      <div class="card-body">
        <div class="card-meta"><span class="jtag" style="background:${j.bg};color:${j.color}">${j.short}</span></div>
        <div class="card-title" style="color:#aaa">수집 실패</div>
        <div class="card-sum fail">⚠ ${x(p.error)}</div>
      </div></div>`;
  }

  const doi = p.doi ? (p.doi.length > 40 ? p.doi.slice(0,40)+'…' : p.doi) : '';
  const sumPart = p.summaryKo
    ? `<div class="sum-label">한국어 번역</div><div class="card-sum">${x(p.summaryKo)}</div>`
    : `<div class="card-sum pend" id="s${p._id}"><span class="sp"></span>번역 중...</div>`;

  return `<div class="card" data-j="${x(j.id)}" style="animation-delay:${i*.05}s">
    <div class="card-top" style="background:linear-gradient(90deg,${j.color},${j.color}77)"></div>
    <div class="card-body">
      <div class="card-meta">
        <span class="jtag" style="background:${j.bg};color:${j.color};border:1px solid ${j.color}44">${j.short}</span>
        ${p.year ? `<span class="ytag">${p.year}</span>` : ''}
      </div>
      <div class="card-title">${x(p.title)}</div>
      ${p.authors ? `<div class="card-auth">${x(p.authors)}</div>` : ''}
      ${sumPart}
      <div class="card-foot">
        <div class="card-doi" title="${x(p.doi)}">${doi}</div>
        <a href="${x(p.link)}" target="_blank" rel="noopener"
           class="card-link" style="background:linear-gradient(135deg,${j.color},${j.color}bb)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>원문
        </a>
      </div>
    </div>
  </div>`;
}

function patchCard(p) {
  const el = document.getElementById(`s${p._id}`);
  if (el) el.outerHTML =
    `<div class="sum-label">한국어 번역</div><div class="card-sum">${x(p.summaryKo)}</div>`;
}

// ================================================================
// Filter / helpers
// ================================================================
function setFilter(btn, f) {
  document.querySelectorAll('.ftag').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  curFilter = f;
  renderGrid();
}
function showProg(v) { document.getElementById('progWrap').style.display = v ? 'block' : 'none'; }
function setProgress(pct, msg) {
  document.getElementById('progFill').style.width = pct + '%';
  document.getElementById('progMsg').textContent = msg;
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function x(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

  document.title = `AI×Materials Daily — ${d.toLocaleDateString('ko-KR',{month:'long',day:'numeric'})}`;
  load();
})();
</script>
